name: Bug Report
description: Report a bug with the Pepper Home Assistant integration
title: '[Bug]: '
labels: ['bug', 'triage']
assignees:
  - FaserF
body:
  - type: markdown
    attributes:
      value: |
        ## Before submitting
        - 🔍 Search [existing issues](https://github.com/FaserF/ha-pepper/issues) to avoid duplicates
        - 📖 Check the [Documentation Site](https://faserf.github.io/ha-pepper/)
        - 🔗 View the integration: [![Open your Home Assistant instance and show the pepper integration.](https://my.home-assistant.io/badges/integration.svg)](https://my.home-assistant.io/redirect/integration/?domain=pepper)

  - type: input
    id: integration_version
    attributes:
      label: Integration Version
      description: Which version of ha-pepper are you running? (HACS or integration page)
      placeholder: e.g. v1.0.0
    validations:
      required: true

  - type: input
    id: ha_version
    attributes:
      label: Home Assistant Version
      description: |
        [![Open your Home Assistant instance and show your Home Assistant version information.](https://my.home-assistant.io/badges/info.svg)](https://my.home-assistant.io/redirect/info/)
      placeholder: e.g. 2026.7.2
    validations:
      required: true

  - type: dropdown
    id: ha_install_type
    attributes:
      label: Home Assistant Installation Type
      description: |
        Can be found in: [![Open your Home Assistant instance and show your Home Assistant version information.](https://my.home-assistant.io/badges/info.svg)](https://my.home-assistant.io/redirect/info/)
      options:
        - Home Assistant OS
        - Home Assistant Container
        - Home Assistant Supervised
        - Home Assistant Core
    validations:
      required: true


  - type: textarea
    id: description
    attributes:
      label: Describe the Bug
      description: A clear and concise description of what the bug is.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: Step-by-step instructions to reproduce the behavior.
      placeholder: |
        1. Configure integration with '...'
        2. Navigate to '...'
        3. See error / unexpected behavior
    validations:
      required: false

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What did you expect to happen?
    validations:
      required: false

  - type: textarea
    id: diagnostics
    attributes:
      label: Diagnostics
      description: |
        Download diagnostics from the integration page and paste here (very helpful!):
        [![Open your Home Assistant instance and show the pepper integration.](https://my.home-assistant.io/badges/integration.svg)](https://my.home-assistant.io/redirect/integration/?domain=pepper)
      render: json
    validations:
      required: false

  - type: textarea
    id: logs
    attributes:
      label: Relevant Log Output
      description: |
        Enable debug logging and paste relevant log lines here.
        Add to `configuration.yaml`:
        ```yaml
        logger:
          default: warning
          logs:
            custom_components.pepper: debug
        ```
      render: shell
    validations:
      required: true
